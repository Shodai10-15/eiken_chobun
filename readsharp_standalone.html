// ===== STATE =====
let ST={
  wpmHistory:[],
  wordStorage:[],
  completedIds:[],
  currentPassage:null,
  startTime:null,
  timerInterval:null,
  selectedAnswers:{},
  answered:false,
  currentWordEl:null
};
try{
  ST.wpmHistory=JSON.parse(localStorage.getItem('rs_wpm')||'[]');
  ST.wordStorage=JSON.parse(localStorage.getItem('rs_words')||'[]');
  ST.completedIds=JSON.parse(localStorage.getItem('rs_completed')||'[]');
}catch(e){}

function save(){
  try{
    localStorage.setItem('rs_wpm',JSON.stringify(ST.wpmHistory));
    localStorage.setItem('rs_words',JSON.stringify(ST.wordStorage));
    localStorage.setItem('rs_completed',JSON.stringify(ST.completedIds));
  }catch(e){}
}

// ===== SCREEN NAV =====
function showScreen(name,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active-nav'));
  if(btn)btn.classList.add('active-nav');
  else{
    const btns=document.querySelectorAll('.nav-btn');
    if(name==='list')btns[0].classList.add('active-nav');
    if(name==='storage')btns[1].classList.add('active-nav');
  }
  if(name==='list')renderPassageList();
  if(name==='storage')renderWordStorage();
}

function updateStorageCount(){
  const n=ST.wordStorage.length;
  document.getElementById('storage-count').textContent=n?'('+n+')':'';
}

// ===== PASSAGE LIST =====
function getLevelLabel(lv){return['','Level 1','Level 2','Level 3','Level 4'][lv]||'Level '+lv;}
function getLevelClass(lv){return['','lv1','lv2','lv3','lv4'][lv]||'lv1';}
function getTargetWpm(lv){return[160,160,180,200,220][lv]||160;}

function renderPassageList(){
  const done=ST.completedIds.length;
  const total=PASSAGES.length;
  document.getElementById('list-progress-text').textContent=done+' / '+total+' completed';
  if(ST.wpmHistory.length>0)renderWpmTrend();
  const list=document.getElementById('passage-list');
  list.innerHTML=PASSAGES.map(p=>{
    const isCompleted=ST.completedIds.includes(p.id);
    return`<div class="passage-card${isCompleted?' completed':''}" onclick="openPassage(${p.id})">
      <div class="pc-top">
        <div class="pc-title">${p.title}${isCompleted?'<span class="pc-check">✓</span>':''}</div>
        <span class="pc-level ${getLevelClass(p.level)}">${getLevelLabel(p.level)}</span>
      </div>
      <div class="pc-meta">${p.topic} · ${p.wordCount} words</div>
    </div>`;
  }).join('');
}

function renderWpmTrend(){
  const hist=ST.wpmHistory.slice(-7);if(!hist.length)return;
  document.getElementById('wpm-trend-section').style.display='block';
  const max=Math.max(...hist.map(h=>h.wpm),1);
  document.getElementById('wpm-history-chart').innerHTML=hist.map((h,i)=>
    `<div class="wpm-bar${i===hist.length-1?' cur':''}" style="height:${Math.round(h.wpm/max*100)}%" title="${h.wpm} WPM"></div>`
  ).join('');
}

// ===== OPEN PASSAGE =====
function openPassage(id){
  const p=PASSAGES.find(x=>x.id===id);
  if(!p)return;
  ST.currentPassage=p;
  ST.selectedAnswers={};
  ST.answered=false;

  document.getElementById('phase-reading').style.display='block';
  document.getElementById('phase-questions').style.display='none';
  document.getElementById('start-btn').style.display='block';
  document.getElementById('finish-btn').style.display='none';
  document.getElementById('passage-overlay').style.display='flex';
  document.getElementById('timer').textContent='0:00';

  document.getElementById('level-label').textContent=getLevelLabel(p.level)+' — '+p.topic;
  document.getElementById('target-wpm').textContent=getTargetWpm(p.level);
  document.getElementById('word-count-display').textContent=p.wordCount;
  document.getElementById('topic-display').textContent=p.topic;
  document.getElementById('passage-text-wrap').className='passage-blur';
  document.getElementById('passage-text-wrap').innerHTML=tokenize(p.text);

  showScreen('reading',null);
}

function tokenize(text){
  const paras=text.split('\n\n');
  return paras.map(para=>{
    const tokenized=para.replace(/([A-Za-z'][A-Za-z'-]*)/g,(word)=>{
      const stocked=ST.wordStorage.some(w=>w.word.toLowerCase()===word.toLowerCase());
      const inDict=!!(DICT[word.toLowerCase()]||DICT[word]);
      return`<span class="word-token${stocked?' stocked':''}" data-word="${word}" onclick="lookupWord(this,event)">${word}</span>`;
    });
    return`<p style="margin-bottom:1em">${tokenized}</p>`;
  }).join('');
}

// ===== READING =====
function startReading(){
  document.getElementById('passage-overlay').style.display='none';
  document.getElementById('passage-text-wrap').className='passage-reveal';
  document.getElementById('start-btn').style.display='none';
  document.getElementById('finish-btn').style.display='block';
  ST.startTime=Date.now();
  ST.timerInterval=setInterval(()=>{
    const el=(Date.now()-ST.startTime)/1000;
    const m=Math.floor(el/60),s=Math.floor(el%60);
    document.getElementById('timer').textContent=m+':'+(s<10?'0':'')+s;
  },200);
}

function finishReading(){
  clearInterval(ST.timerInterval);
  const elapsed=(Date.now()-ST.startTime)/1000;
  const wpm=Math.round((ST.currentPassage.wordCount/elapsed)*60);
  ST.wpmHistory.push({wpm,passageId:ST.currentPassage.id,date:new Date().toLocaleDateString('ja-JP')});
  if(ST.wpmHistory.length>30)ST.wpmHistory=ST.wpmHistory.slice(-30);
  save();

  document.getElementById('phase-reading').style.display='none';
  document.getElementById('phase-questions').style.display='block';

  const m=Math.floor(elapsed/60),s=Math.floor(elapsed%60);
  document.getElementById('result-wpm').textContent=wpm;
  document.getElementById('result-time').textContent=m+':'+(s<10?'0':'')+s;
  document.getElementById('result-words').textContent=ST.currentPassage.wordCount;

  const target=getTargetWpm(ST.currentPassage.level);
  const prev=ST.wpmHistory.length>1?ST.wpmHistory[ST.wpmHistory.length-2]:null;
  let fb=wpm>=target?'<span class="chip chip-up">● Above target</span>':'<span class="chip chip-same">● Below target ('+target+' WPM)</span>';
  if(prev){const d=wpm-prev.wpm;fb+=d>0?'<span class="chip chip-up">↑ +'+d+' vs last</span>':d<0?'<span class="chip chip-down">↓ '+d+' vs last</span>':'<span class="chip chip-same">→ Same as last</span>';}
  document.getElementById('wpm-feedback').innerHTML=fb;
  document.getElementById('check-btn').style.display='block';
  document.getElementById('score-section').style.display='none';
  renderQuestions();
}

function renderQuestions(){
  const qs=ST.currentPassage.questions;
  document.getElementById('questions-wrap').innerHTML=qs.map((q,qi)=>
    `<div class="q-item" id="q-${qi}">
      <div class="q-type">${q.type}</div>
      <div class="q-text">${q.question}</div>
      <div class="q-opts">${q.options.map((o,oi)=>
        `<button class="q-opt" id="opt-${qi}-${oi}" onclick="selectAnswer(${qi},${oi})">
          <span class="opt-letter">${String.fromCharCode(65+oi)}</span>
          <span>${o.replace(/^[A-D]\)\s*/,'')}</span>
        </button>`).join('')}
      </div>
      <div class="explanation" id="exp-${qi}">${q.explanation||''}</div>
    </div>`
  ).join('');
}

function selectAnswer(qi,oi){
  if(ST.answered)return;
  ST.selectedAnswers[qi]=oi;
  document.querySelectorAll(`#q-${qi} .q-opt`).forEach(b=>b.classList.remove('selected'));
  document.getElementById(`opt-${qi}-${oi}`).classList.add('selected');
}

function checkAnswers(){
  if(ST.answered)return;
  ST.answered=true;
  const qs=ST.currentPassage.questions;let correct=0;
  qs.forEach((q,qi)=>{
    const sel=ST.selectedAnswers[qi],ans=q.answer;
    document.querySelectorAll(`#q-${qi} .q-opt`).forEach((b,oi)=>{
      if(oi===ans)b.classList.add('correct');
      else if(oi===sel&&sel!==ans)b.classList.add('wrong');
    });
    if(sel===ans)correct++;
    const exp=document.getElementById('exp-'+qi);
    if(exp)exp.style.display='block';
  });
  document.getElementById('check-btn').style.display='none';
  document.getElementById('score-section').style.display='block';
  document.getElementById('score-text').textContent=correct+' / '+qs.length;
  document.getElementById('score-sub').textContent=['Keep practicing!','Good effort!','Nice work!','Excellent!','Perfect!'][Math.min(Math.round(correct/qs.length*4),4)];
  if(!ST.completedIds.includes(ST.currentPassage.id)){
    ST.completedIds.push(ST.currentPassage.id);save();
  }
}

// ===== WORD LOOKUP =====
function lookupWord(el,e){
  e.stopPropagation();
  const word=el.dataset.word;if(!word||word.length<2)return;
  if(ST.currentWordEl)ST.currentWordEl.style.background='';
  ST.currentWordEl=el;
  const entry=DICT[word.toLowerCase()]||DICT[word];
  document.getElementById('tt-word').textContent=word;
  document.getElementById('tt-pos').textContent=entry?entry.pos:'';
  document.getElementById('tt-meaning').textContent=entry?entry.ja:'（辞書にない単語です）';
  const isStocked=ST.wordStorage.some(w=>w.word.toLowerCase()===word.toLowerCase());
  const sb=document.getElementById('tt-stock-btn');
  sb.textContent=isStocked?'✓ In word storage':'+ Stock this word';
  sb.className='tt-btn'+(isStocked?' stocked-state':'');
  document.getElementById('tt-overlay').classList.add('open');
}

function closeTT(e){
  if(e.target===document.getElementById('tt-overlay')||e.target.classList.contains('tt-backdrop')){
    document.getElementById('tt-overlay').classList.remove('open');
  }
}

function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}

function stockWord(){
  const word=document.getElementById('tt-word').textContent;
  const meaning=document.getElementById('tt-meaning').textContent;
  const pos=document.getElementById('tt-pos').textContent;
  const idx=ST.wordStorage.findIndex(w=>w.word.toLowerCase()===word.toLowerCase());
  const sb=document.getElementById('tt-stock-btn');
  if(idx>=0){
    ST.wordStorage.splice(idx,1);
    sb.textContent='+ Stock this word';sb.className='tt-btn';
    document.querySelectorAll('.word-token').forEach(t=>{if(t.dataset.word&&t.dataset.word.toLowerCase()===word.toLowerCase())t.classList.remove('stocked');});
  }else{
    const now=new Date();
    ST.wordStorage.unshift({word,pos,meaning,addedDate:now.toLocaleDateString('ja-JP'),reviewDates:[addDays(now,1),addDays(now,3),addDays(now,7)].map(d=>d.toLocaleDateString('ja-JP'))});
    sb.textContent='✓ In word storage';sb.className='tt-btn stocked-state';
    document.querySelectorAll('.word-token').forEach(t=>{if(t.dataset.word&&t.dataset.word.toLowerCase()===word.toLowerCase())t.classList.add('stocked');});
  }
  save();updateStorageCount();
}

// ===== WORD STORAGE =====
function renderWordStorage(){
  const list=document.getElementById('word-storage-list');
  const today=new Date().toLocaleDateString('ja-JP');
  const due=ST.wordStorage.filter(w=>w.reviewDates&&w.reviewDates.includes(today));
  const notice=document.getElementById('review-notice');
  if(due.length>0){notice.style.display='flex';document.getElementById('review-notice-text').textContent=due.length+'語の復習日です';}
  else notice.style.display='none';
  if(!ST.wordStorage.length){list.innerHTML='<div class="empty-state">単語はまだありません。<br>長文を読みながら単語をタップして調べてみましょう。</div>';return;}
  const sorted=[...ST.wordStorage].sort((a,b)=>{
    const at=a.reviewDates&&a.reviewDates.includes(today);
    const bt=b.reviewDates&&b.reviewDates.includes(today);
    return at===bt?0:at?-1:1;
  });
  list.innerHTML='<div class="word-list">'+sorted.map(w=>{
    const isDue=w.reviewDates&&w.reviewDates.includes(today);
    const origIdx=ST.wordStorage.indexOf(w);
    return`<div class="word-item">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
          <span class="word-en">${w.word}</span>
          <span class="word-pos">${w.pos||''}</span>
        </div>
        <div class="word-ja">${w.meaning||''}</div>
        <div class="word-date">追加: ${w.addedDate||''}${isDue?' <span class="review-badge">今日復習</span>':''}</div>
      </div>
      <button class="remove-btn" onclick="removeWord(${origIdx})">削除</button>
    </div>`;
  }).join('')+'</div>';
}

function removeWord(idx){ST.wordStorage.splice(idx,1);save();updateStorageCount();renderWordStorage();}

// ===== INIT =====
updateStorageCount();
renderPassageList();
</script>
</body>
</html>
